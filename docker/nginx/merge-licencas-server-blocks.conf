# Blocos para incluir no default.conf do nginx do projeto licencas (mesmo container).
# Pré-requisito: o nginx_gateway já participa da rede Docker onde estão api e financeiro:
#   docker network connect bomanejo_ambiental nginx_gateway
#
# Ajuste: ssl_certificate para o caminho real do certificado (SAN com os dois subdomínios).
# Use a zona limit_req zone=api já definida no licencas, ou altere o nome.

server {
    listen 443 ssl;
    http2 on;
    client_max_body_size 50M;
    server_name api-financeiro.bomanejo.com.br;

    ssl_certificate /etc/letsencrypt/live/api-financeiro.bomanejo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-financeiro.bomanejo.com.br/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://api:3333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl;
    http2 on;
    client_max_body_size 50M;
    server_name financeiro.bomanejo.com.br;

    ssl_certificate /etc/letsencrypt/live/api-financeiro.bomanejo.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-financeiro.bomanejo.com.br/privkey.pem;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://financeiro:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_redirect off;
    }
}
