# Incluir no nginx do licencas (conf.d) se ainda não existir server_name para estes hosts.
# Garante ACME HTTP-01 e redirecionamento para HTTPS.

server {
    listen 80;
    server_name api-financeiro.bomanejo.com.br financeiro.bomanejo.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
