# Primeira implantação (antes do certificado Let's Encrypt).
# Após certbot: cp docker/nginx/default.ssl.conf docker/nginx/default.conf && docker compose exec nginx nginx -s reload

limit_req_zone $binary_remote_addr zone=financeiro_api:10m rate=20r/s;

server {
    listen 80;
    server_name api-financeiro.bomanejo.com.br financeiro.bomanejo.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 503 "Após o certbot, copie default.ssl.conf para default.conf\n";
        add_header Content-Type text/plain;
    }
}
