# Produção: PostgreSQL + API + frontend financeiro
#
# Uso:
#   cp docker/env.example .env
#   # edite .env (URLs públicas, segredos, GitHub OAuth)
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Migrações rodam na subida do container da API (entrypoint). Para pular: SKIP_MIGRATE=1
#
# Mesma VPS que outro stack (ex.: licencas): 3000 e 3333 no host podem estar ocupados.
# Padrão aqui: host 3001 → financeiro, host 3334 → API (ajuste API_PORT / FINANCEIRO_PORT no .env).
# Com nginx/caddy na frente, costuma não publicar essas portas — use proxy para os containers.

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ambiental}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ambiental}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - ambiental

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ambiental}
      SERVER_PORT: "3333"
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      GITHUB_OAUTH_CLIENT_REDIRECT_URI: ${GITHUB_OAUTH_CLIENT_REDIRECT_URI}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
      SKIP_MIGRATE: ${SKIP_MIGRATE:-0}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-3334}:3333"
    networks:
      - ambiental

  financeiro:
    build:
      context: .
      dockerfile: docker/Dockerfile.financeiro
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://api:3333
    depends_on:
      - api
    ports:
      - "${FINANCEIRO_PORT:-3001}:3000"
    networks:
      - ambiental

volumes:
  postgres_data:

networks:
  ambiental:
    driver: bridge
